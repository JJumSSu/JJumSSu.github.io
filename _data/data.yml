career-profile:
    title: About
    summary: |
      I am a reserach scientist at Naver Clova. My research area is based on natural language processing and deep learning. 
      Specifically, I'm interested in modeling generalizable language models given limited labeled data.
      Towards this goal, my research of interest spans across semi-supervised learning with augmentation and distillation from external knowledge.
      Prior to Naver, I received B.S. and M.S. in Statistics and Computer Science & Engineering from Korea University.     


